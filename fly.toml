# fly.toml — Pulse app configuration for Fly.io
# Run `fly launch` to create the app and attach a Postgres database,
# or use `fly deploy` if the app already exists.

app = "pulse"
primary_region = "lhr"  # London — change to your preferred region

[build]

[env]
  PORT = "8080"
  PHX_HOST = "pulse.fly.dev"  # Update after fly launch assigns your hostname

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "connections"
    hard_limit = 1000
    soft_limit = 800

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[deploy]
  # Run migrations before the new release goes live
  release_command = "/app/bin/pulse eval \"Pulse.Release.migrate()\""
